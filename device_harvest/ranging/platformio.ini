; PlatformIO Project Configuration
;
; Makerfabs ESP32 UWB 앵커/태그 펌웨어 - 다중 변종(variant) 관리.
;
; 각 변종 = 독립 env + 독립 소스 폴더. (변종은 거의 독립 구현)
; 칩(DW1000/DW3000)에 따라 라이브러리와 칩별 공통 레이어가 다르다.
;
; 변종 빌드 예:
;   pio run -e anchor_dw1000_accuracy_meshagent
;   pio run -e tag_dw1000_responder -t upload
;   pio device monitor
;
; 변종 네이밍 규칙 (CLAUDE.md 참고):
;   {role}_{chip}_{rfmode}[_{features...}]
;   role    : anchor | tag
;   chip    : dw1000 | dw3000
;   rfmode  : accuracy | lowpower | fast
;   features: oled | wifi | filtered ...  (선택, 복수 가능)

[platformio]
; 기본 빌드: 대표 변종 몇 개만. (전체 빌드는 각 env 명시)
default_envs = anchor_dw1000_accuracy_meshagent, tag_dw1000_responder

; ============================================================
; 공통 베이스
; ============================================================
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -I src/common

; ============================================================
; 칩별 베이스 (라이브러리 + 칩별 공통 레이어 + include 경로)
; 변종 env는 아래 칩 베이스 중 하나를 extends 한다.
; ============================================================
[chip_dw1000]
lib_deps = mf_DW1000
build_flags =
    ${env.build_flags}
    -D CHIP_DW1000
    -I src/common_dw1000

[chip_dw3000]
lib_deps = mf_DW3000
build_flags =
    ${env.build_flags}
    -D CHIP_DW3000
    -I src/common_dw3000

; ============================================================
; 변종 환경 (DW1000 계열)
; build_src_filter: common + 해당 칩 공통 레이어 + 변종 폴더만 컴파일
; ============================================================
; --- CORE mesh-TDMA (역할 반전: 물리 앵커=initiator, 물리 태그=responder) ---
; anchor_..._meshagent: 앵커가 태그를 스케줄 폴 (L4 우선순위 + L2/L3 골격). docs/ARCHITECTURE_mesh_tdma.md
[env:anchor_dw1000_accuracy_meshagent]
extends = chip_dw1000
build_src_filter = +<common/> +<common_dw1000/> +<anchor_dw1000_accuracy_meshagent/>
build_flags = ${chip_dw1000.build_flags} -D ROLE_ANCHOR -D RFMODE_ACCURACY -D FEATURE_MESH -D FEATURE_AGENT

; tag_..._responder: 폴에 응답만 하는 단순 이동 태그.
[env:tag_dw1000_responder]
extends = chip_dw1000
build_src_filter = +<common/> +<common_dw1000/> +<tag_dw1000_responder/>
build_flags = ${chip_dw1000.build_flags} -D ROLE_TAG -D RFMODE_ACCURACY

; ============================================================
; 변종 환경 (DW3000 계열)
; ============================================================
[env:anchor_dw3000_accuracy]
extends = chip_dw3000
build_src_filter = +<common/> +<common_dw3000/> +<anchor_dw3000_accuracy/>
build_flags = ${chip_dw3000.build_flags} -D ROLE_ANCHOR -D RFMODE_ACCURACY

[env:tag_dw3000_fast_filtered]
extends = chip_dw3000
build_src_filter = +<common/> +<common_dw3000/> +<tag_dw3000_fast_filtered/>
build_flags = ${chip_dw3000.build_flags} -D ROLE_TAG -D RFMODE_FAST -D FEATURE_FILTERED
