services:
  harvest:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: harvest:dev
    network_mode: host   # keeps ROS_MASTER_URI trivial on a single machine
    volumes:
      - ../catkin_ws:/catkin_ws   # live-edit; rebuild with catkin_make inside container
      - ../data:/data             # CSV output persists across restarts
    environment:
      # Set to 0 to skip the automatic catkin_make on first startup.
      AUTO_BUILD: "1"
    # --- Serial device passthrough -------------------------------------------
    # Replace with real stable paths from `ls -l /dev/serial/by-id/`.
    # devices:
    #   - "/dev/serial/by-id/usb-<UWB_DEVICE>-if00-port0:/dev/ttyUSB_UWB"
    #   - "/dev/serial/by-id/usb-<SCALE_DEVICE>-if00-port0:/dev/ttyUSB_SCALE"
    group_add:
      - dialout   # allows the container user to open ttyUSB* ports
    # -------------------------------------------------------------------------
    stdin_open: true
    tty: true
    # Default: interactive shell after (auto-)build.
    # Switch to the launch line once device paths and params are configured:
    # command: roslaunch harvest_recorder bringup.launch
    command: bash
