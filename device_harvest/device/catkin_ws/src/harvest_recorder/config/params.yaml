recorder:
  uwb_topic:   "/uwb/position"
  scale_topic: "/scale/weight"
  slop: 0.1            # max time difference (s) to consider UWB + scale a matched pair
  queue_size: 50
  csv_path: "/data"    # directory; a timestamped file (harvest_YYYYMMDD_HHMMSS.csv) is created
  publish_synced: true
  synced_topic: "/synced/reading"
